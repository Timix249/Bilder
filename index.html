<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <title>Bilder Galerie</title>

  <style>
    body {
      font-family: Arial;
      text-align: center;
      background: #f5f5f5;
    }

    h1 {
      margin: 20px;
    }

    .gallery {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 10px;
      padding: 20px;
    }

    .gallery img {
      width: 100%;
      max-width: 120px;
      border-radius: 10px;
      cursor: pointer;
      transition: 0.3s;
    }

    .gallery img:hover {
      transform: scale(1.1);
    }

    /* Popup */
    .popup {
      display: none;
      position: fixed;
      z-index: 1000;
      left: 0;
      top: 0;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.8);
    }

    .popup img {
      max-width: 80%;
      max-height: 80%;
      margin-top: 5%;
      border-radius: 10px;
    }

    /* X schließen */
    .close {
      position: absolute;
      top: 20px;
      right: 40px;
      font-size: 40px;
      color: white;
      cursor: pointer;
    }
  </style>
</head>
<body>

  <h1>Meine Bilder</h1>

  <div class="gallery">
    <img src="./1.jpg" onclick="openPopup(this.src)">
    <img src="./2.jpg" onclick="openPopup(this.src)">
    <img src="./haus wald.jpg" onclick="openPopup(this.src)">
    <img src="./ich + kamilla.jpg" onclick="openPopup(this.src)">
  </div>

  <!-- Popup -->
  <div class="popup" id="popup">
    <span class="close" onclick="closePopup()">×</span>
    <img id="popup-img">
  </div>

  <script>
    function openPopup(src) {
      document.getElementById("popup").style.display = "block";
      document.getElementById("popup-img").src = src;
    }

    function closePopup() {
      document.getElementById("popup").style.display = "none";
    }
  </script>

</body>
</html>
